<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Биоритмы — Перенаправление</title>
<script>
(function(){
  var path = window.location.pathname;
  // Если URL вида /invite/CODE — перенаправляем на /invite/?code=CODE
  var match = path.match(/^\/invite\/([A-Za-z0-9]+)/);
  if (match) {
    window.location.replace('/invite/?code=' + match[1]);
    return;
  }
  // Для всех остальных 404 — на главную
  window.location.replace('/');
})();
</script>
</head>
<body>
<p>Перенаправление…</p>
</body>
</html>
